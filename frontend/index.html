<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy:
      - default-src 'self'         : デフォルトは同一オリジンのみ許可
      - script-src 'self'          : スクリプトは同一オリジンのみ（インラインスクリプト禁止）
      - style-src 'self' 'unsafe-inline' unpkg.com : Tailwind のインラインスタイルと Leaflet CSS (unpkg) を許可
      - img-src 'self' data: blob: *.openstreetmap.org *.tile.openstreetmap.org :
          地図タイル・Base64画像・Blob URLを許可
      - connect-src 'self' nominatim.openstreetmap.org :
          Nominatim ジオコーディング API への fetch を許可
      - font-src 'self'            : フォントは同一オリジンのみ
      - object-src 'none'          : Flash等のプラグインを完全禁止
      - base-uri 'self'            : <base>タグによるオリジン変更を禁止
      - form-action 'self'         : フォーム送信先を同一オリジンに限定
      - frame-ancestors 'none'     : iframe埋め込みを完全禁止（クリックジャッキング対策）
    -->
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline' https://unpkg.com;
        img-src 'self' data: blob: https://*.openstreetmap.org https://*.tile.openstreetmap.org;
        connect-src 'self' https://nominatim.openstreetmap.org;
        font-src 'self';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
        frame-ancestors 'none';
      " />
    <title>バス回送物流プラットフォーム</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
