  #         working-directory: ./backend

  #     - name: Build
  #       run: go build -v ./main.go

  # --- Frontend (Node.js) のジョブ ---
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend # frontendディレクトリ内でコマンドを実行
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25' # プロジェクトに合わせて調整
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        # package.json に "lint" スクリプトがある前提です
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Security Audit
        run: npm audit --audit-level=high