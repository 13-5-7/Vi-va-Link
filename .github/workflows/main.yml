  #   defaults:
  #     run:
  #       working-directory: ./backend # backendディレクトリ内でコマンドを実行
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4

  #     - name: Set up Go
  #       uses: actions/setup-go@v5
  #       with:
  #         go-version: '1.26' # 使用しているGoのバージョンに合わせて調整
