services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: bus_logistics
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d bus_logistics"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      OSRM_BASE_URL: https://router.project-osrm.org
      PORT: 8080
    ports:
      - "8080:8080"
    command: air
    volumes:
      - ./backend:/app
    working_dir: /app

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    working_dir: /app

volumes:
  pgdata:
  frontend_node_modules:
